name: Football Slot Booking

on:
  schedule:
    - cron: '35 16 * * FRI' # Runs every Friday at 19:35 Bucharest time (16:35 UTC)
  workflow_dispatch:

jobs:
  book_slot:
    runs-on: ubuntu-latest
    env:
      SPORT_NAME: ${{ secrets.SPORT_NAME || 'Fotbal' }}
      SPORTS_COMPLEX: ${{ secrets.SPORTS_COMPLEX || 'Baza Sportivă „La Terenuri“' }}
      MAIN_ACCOUNT_EMAIL: ${{ secrets.MAIN_ACCOUNT_EMAIL }}
      MAIN_ACCOUNT_PASSWORD: ${{ secrets.MAIN_ACCOUNT_PASSWORD }}
      OTHER_ACCOUNT_1_EMAIL: ${{ secrets.OTHER_ACCOUNT_1_EMAIL }}
      OTHER_ACCOUNT_1_PASSWORD: ${{ secrets.OTHER_ACCOUNT_1_PASSWORD }}
      OTHER_ACCOUNT_2_EMAIL: ${{ secrets.OTHER_ACCOUNT_2_EMAIL }}
      OTHER_ACCOUNT_2_PASSWORD: ${{ secrets.OTHER_ACCOUNT_2_PASSWORD }}
      OTHER_ACCOUNT_3_EMAIL: ${{ secrets.OTHER_ACCOUNT_3_EMAIL }}
      OTHER_ACCOUNT_3_PASSWORD: ${{ secrets.OTHER_ACCOUNT_3_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync

      - name: Run booking script
        timeout-minutes: 15
        run: uv run python main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-screenshots
          path: "*.png"
          retention-days: 3
